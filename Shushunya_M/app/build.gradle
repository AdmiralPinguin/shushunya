def localEnvValue(String path, String key) {
    def file = rootProject.file(path)
    if (!file.isFile()) {
        return ''
    }
    def line = file.readLines().collect { it.trim() }.find { it.startsWith("${key}=") }
    if (!line) {
        return ''
    }
    return line.substring(line.indexOf('=') + 1).trim().replaceAll(/^['"]|['"]$/, '')
}

def clientApiKey = (
        project.findProperty("SHUSHUNYA_CLIENT_API_KEY")
