                ?: project.findProperty("SHUSHUNYA_MOBILE_API_KEY")
                ?: System.getenv("SHUSHUNYA_MOBILE_API_KEY")
                ?: localEnvValue("../ArchiveOfHeresy/.env", "ARCHIVE_CLIENT_API_KEY")
                ?: localEnvValue("../ArchiveOfHeresy/.env", "ARCHIVE_MOBILE_API_KEY")
